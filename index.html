<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUNIR — Stake Pool</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #0D1221;
    color: #C9A84C;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .banner {
    width: 100%;
    max-height: 340px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .banner img {
    width: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .main {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 2rem 4rem;
    max-width: 680px;
    width: 100%;
    gap: 2rem;
  }

  .logo-wrap {
    margin-top: -60px;
    width: 200px;
    height: 200px;
    flex-shrink: 0;
  }

  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .name {
    font-size: 2rem;
    font-weight: normal;
    letter-spacing: 0.35em;
    color: #C9A84C;
    text-align: center;
  }

  .subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    color: #7A6030;
    text-transform: lowercase;
    text-align: center;
    margin-top: -1.25rem;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #C9A84C;
    opacity: 0.4;
  }

  .description {
    font-size: 0.95rem;
    line-height: 1.85;
    color: #9A8050;
    text-align: center;
    max-width: 520px;
    font-style: italic;
  }

  .description em {
    color: #C9A84C;
    font-style: normal;
  }

  .star {
    color: #C9A84C;
    font-size: 1.1rem;
    opacity: 0.5;
    margin-top: 1rem;
  }

  footer {
    margin-top: auto;
    padding: 2rem;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: #3A2E18;
    text-align: center;
  }
</style>
</head>
<body>

<div class="banner">
  <img src="banner.png" alt="RUNIR banner">
</div>

<div class="main">
  <div class="logo-wrap">
    <img src="logo.png" alt="RUNIR logo">
  </div>

  <h1 class="name">RUNIR</h1>
  <p class="subtitle">stake pool</p>

  <div class="divider"></div>

  <p class="description">
    Every node counts — <em>encoded in the runes</em>.<br><br>
    A quietly operated, technically serious stake pool run for the love of decentralisation — named after the Norse runes, where meaning is encoded for those who know how to read it.
  </p>

  <div class="star">✦</div>
</div>

<footer>runir.org &nbsp;·&nbsp; @Runvordr</footer>

</body>
</html>
