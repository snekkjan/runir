<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUNIR — Stake Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #11182A;
    color: #C9A84C;
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .main {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 2rem 4rem;
    max-width: 680px;
    width: 100%;
    gap: 2rem;
  }

  .logo-wrap {
    margin-top: 0;
    width: 260px;
    height: 260px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
  }

  .logo-wrap img {
    width: 118%;
    height: 118%;
    margin-left: -9%;
    margin-top: -9%;
    object-fit: cover;
    display: block;
  }

  .name {
    font-family: 'Cinzel', serif;
    font-size: 2.8rem;
    font-weight: 400;
    letter-spacing: 0.45em;
    color: #C9A84C;
    text-align: center;
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.35em;
    color: #7A6030;
    text-transform: lowercase;
    text-align: center;
    margin-top: -1.25rem;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #C9A84C;
    opacity: 0.4;
  }

  .description {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    line-height: 1.85;
    color: #9A8050;
    text-align: center;
    max-width: 520px;
    font-style: italic;
  }

  .description em {
    color: #C9A84C;
    font-style: normal;
  }

  .star {
    color: #C9A84C;
    font-size: 1.1rem;
    opacity: 0.5;
    margin-top: 1rem;
  }

  footer {
    margin-top: auto;
    padding: 2rem;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: #3A2E18;
    text-align: center;
  }
</style>
</head>
<body>

<div class="main">
  <div class="logo-wrap">
    <img src="logo.png" alt="RUNIR logo">
  </div>

  <h1 class="name">RUNIR</h1>
  <p class="subtitle">stake pool</p>

  <div class="divider"></div>

  <p class="description">
    Every node counts — <em>encoded in the runes</em>.<br><br>
    A quietly operated, technically serious stake pool run for the love of decentralisation — named after the Norse runes, where meaning is encoded for those who know how to read it.
  </p>

  <div class="star">✦</div>
</div>

<footer>runir.org &nbsp;·&nbsp; @runthulr</footer>

</body>
</html>
